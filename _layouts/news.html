---
layout: default
---

<article class="page wrap news-detail">
  <p class="news-date">
    {% if page.lang == 'ko' %}
      {{ page.date | date: "%Y.%m.%d" }}
    {% else %}
      {{ page.date | date: "%B %-d, %Y" }}
    {% endif %}
  </p>
  <h2>{{ page.title }}</h2>

  {% if page.image %}
    <figure class="news-hero-image">
      <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}">
      {% if page.image_caption %}
        <figcaption>{{ page.image_caption }}</figcaption>
      {% endif %}
    </figure>
  {% endif %}

  <div class="news-body">
    {{ content }}
  </div>

  {% if page.lang == 'ko' %}
    <p><a class="read-more" href="{{ '/ko/news/' | relative_url }}">Back to News</a></p>
  {% else %}
    <p><a class="read-more" href="{{ '/news/' | relative_url }}">Back to News</a></p>
  {% endif %}
</article>
