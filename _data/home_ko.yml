intro:
- "사진측량·원격탐사 및 지형공간정보 연구실(PRSG Lab)에 오신 것을 환영합니다."
- "PRSG Lab은 전북대학교 토목공학과에 소속된 측량 및 지형공간정보 분야 연구실입니다. 본 연구실은 측량학, 측지학, 사진측량, 원격탐사, 영상기하 원리에 기반하여 정밀한 지형공간 데이터 생성, 지구관측 데이터 분석, 3차원 공간 모델링을 수행합니다."
- "전통적인 측량 및 사진측량 이론과 최신 인공지능·컴퓨터비전 기술을 결합하여 위성영상, 항공영상, 드론영상, 지상영상 및 레이저 스캐닝 데이터에서 신뢰할 수 있는 위치·형상·변화 정보를 추출합니다."
- "현재 우리 연구실은 전일제 석사 및 박사과정 대학원생을 모집하고 있습니다. 자세한 사항은 Opportunities 탭의 내용을 확인해 주세요."
