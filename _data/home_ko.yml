intro:
- "사진측량·원격탐사 및 지리정보 연구실(PRSG Lab)에 오신 것을 환영합니다."
- "PRSG Lab은 전북대학교 토목공학과에 소속된 지형공간정보 분야 연구실입니다. 본 연구실은 측지학, 사진측량, 원격탐사, 영상기하 원리에 기반하여 정밀한 지리공간 데이터 생성, 지구관측 데이터 분석, 3차원 공간 모델링을 수행합니다. PRSG Lab은 사진측량 기반 계측, 위성 및 항공 원격탐사, LiDAR 포인트클라우드 처리, 지형공간정보공학, 3차원 재구성이 만나는 영역에서 연구를 수행합니다. 영상, 포인트클라우드, 다양한 지리공간 관측자료로부터 신뢰성 있는 공간정보를 추출하기 위한 방법론을 개발하고 적용하며, 특히 센서 기하, 위치 정확도, 데이터 융합, 정량적 분석에 중점을 둡니다. 본 연구실의 연구는 위성영상, UAV 매핑, 지상 레이저 스캐닝, 모바일 매핑, 근거리 영상 시스템 등 다양한 플랫폼과 공간 스케일을 포괄합니다. 이러한 자료를 바탕으로 정밀 매핑, 지형 및 객체 모델링, 환경 모니터링, 인프라 분석, 스마트 지리공간정보 시스템과 관련된 문제를 다룹니다."
- "PRSG Lab은 엄밀한 기하 모델링과 현대적인 계산 기법을 결합하여, 학술 연구, 공학적 응용, 그리고 도시 및 자연환경에 대한 의사결정에 활용할 수 있는 정확하고 해석 가능하며 실용적인 지리공간정보를 생산하는 것을 목표로 합니다."
