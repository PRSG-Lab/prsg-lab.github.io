bio:
  - "김남훈 교수는 현재 전북대학교 토목공학과에서 조교수로 재직 중입니다. 지표면 센서부터 우주 공간의 카메라 센서까지 다양한 영상 센서의 기하 모델링을 연구하고 있습니다."
  - "주요 연구 관심사는 사진측량, 원격탐사, 지리공간정보 분석, 카메라 센서 기하모델링, LiDAR 포인트클라우드 처리, 컴퓨터 비전, 고품질 디지털 트윈을 위한 3차원 재구성입니다."
