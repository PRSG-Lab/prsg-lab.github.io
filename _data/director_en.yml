bio:
  - "Namhoon Kim is currently serving as an Assistant Professor in the Department of Civil Engineering at Jeonbuk National University. He has specialized expertise in geometric modeling for a variety of camera sensors, from surface-based sensors to spaceborne camera systems."
  - "His research interests include photogrammetry, remote sensing, geospatial data analysis, camera sensor geometry, LiDAR point cloud processing, computer vision, and 3D reconstruction for high-quality digital twins."
