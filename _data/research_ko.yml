- title: "Photogrammetry (사진측량)"
  description: "영상 기반 카메라 기하, 영상 표정, 정밀 매칭 및 계측 기술을 연구한다. 특히 카메라 보정, 번들 조정, 2D–3D 기하관계 해석을 통해 영상으로부터 신뢰성 있는 3차원 위치정보와 형상정보를 추출하는 방법을 다룬다."
  image: "/assets/images/research/photogrammetry.png"
  keywords: ["카메라 보정", "번들 조정", "영상 매칭"]
- title: "Remote Sensing (원격탐측)"
  description: "위성 및 항공 관측자료를 활용하여 지표 환경, 도시공간, 사회기반시설의 상태와 변화를 분석한다. 다중분광·고해상도 영상, 변화탐지, GeoAI 기반 영상해석을 통해 지구관측 자료의 정량적 활용 가능성을 확장한다."
  image: "/assets/images/research/remote-sensing.png"
  keywords: ["다중분광 영상", "변화탐지", "지구관측"]
- title: "Satellite Image Geometry (위성영상 기하)"
  description: "위성영상의 센서모델, RPC/RFM, 정사보정, 위치정확도 검증 방법을 연구한다. 물리 센서모델과 수학적 보정모델을 기반으로 위성영상의 기하오차를 분석하고, 고정밀 지리공간정보 생성을 위한 보정 및 검증 체계를 개발한다."
  image: "/assets/images/research/satellite-image-geometry.png"
  keywords: ["센서 모델", "정사보정", "정확도 평가"]
- title: "UAV Mapping (UAV 매핑)"
  description: "무인항공기 기반 저고도 영상 취득, 비행계획, SfM 기반 3차원 재구성, 정사영상 제작 및 정확도 평가를 연구한다. UAV 영상자료를 활용하여 소규모 지역의 정밀 지도 제작, 시설물 모니터링, 지형·객체 모델링을 수행한다."
  image: "/assets/images/research/uav-mapping.png"
  keywords: ["비행계획", "SfM", "매핑 정확도"]
- title: "Pointcloudmetry (포인트 클라우드 처리)"
  description: "LiDAR, TLS, MMS, UAV 및 사진측량 기반으로 취득된 3차원 포인트클라우드의 정합, 분류, 변화탐지 및 기하해석을 연구한다. 점군 자료의 정확도, 밀도, 표면특성, 불확실성을 정량적으로 평가하여 지형·구조물·도시공간 분석에 활용한다."
  image: "/assets/images/research/pointcloudmetry.png"
  keywords: ["정합", "분류", "3차원 특징"]
- title: "3D Reconstruction (3차원 재구성)"
  description: "영상, 포인트클라우드, LiDAR 등 다양한 관측자료로부터 지형, 건물, 인프라의 3차원 형상과 표면을 재구성하는 방법을 연구한다. SfM, MVS, NeRF, 3D Gaussian Splatting 등 전통적·최신 3차원 장면 표현 기법을 함께 다룬다."
  image: "/assets/images/research/3d-reconstruction.png"
  keywords: ["표면 모델링", "실감 복원", "디지털 트윈"]
- title: "Spatial Data Analysis (공간자료 분석)"
  description: "공간 패턴, 위치 정확도, 불확실성, 데이터 품질을 정량적으로 분석하는 지리공간정보 분석 방법을 연구한다. GIS, 공간통계, 지리공간 데이터 융합 기법을 활용하여 측량·원격탐사·3차원 공간자료의 해석 가능성과 활용성을 높인다."
  image: "/assets/images/research/spatial-data-analysis.png"
  keywords: ["공간통계", "불확실성", "데이터 품질"]

