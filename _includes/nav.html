<nav class="site-nav" aria-label="Primary navigation">
  <div class="wrap nav-inner">
    {% for item in site.data.navigation %}
      {% assign target = item.url_en %}
      {% if page.lang == 'ko' %}
        {% assign target = item.url_ko %}
      {% endif %}
      <a href="{{ target | relative_url }}" {% if page.url == target %}aria-current="page"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </div>
</nav>
